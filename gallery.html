<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動圖片 - 原神角色 Wiki</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/gallery.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/music-player.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <a href="index.html">
                    <h1>原神角色 Wiki</h1>
                </a>
            </div>
            <nav class="main-nav">
                <a href="/" class="nav-tab">角色列表</a>
                <a href="/gallery" class="nav-tab active">活動圖片</a>
            </nav>
        </div>
    </header>

    <main class="main-content gallery-page">
        <div class="gallery-header">
            <h2>活動圖片</h2>
            <button class="btn btn-primary" id="add-media-btn">新增媒體</button>
        </div>

        <div class="gallery-filters">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="official">官方活動</button>
            <button class="filter-btn" data-category="festival">節日賀圖</button>
            <button class="filter-btn" data-category="pv">宣傳PV</button>
            <button class="filter-btn" data-category="wallpaper">桌布</button>
            <button class="filter-btn" data-category="other">其他</button>
        </div>

        <div class="gallery-tabs">
            <button class="gallery-tab active" data-type="all">全部</button>
            <button class="gallery-tab" data-type="image">圖片</button>
            <button class="gallery-tab" data-type="video">影片</button>
        </div>

        <div class="gallery-grid" id="gallery-grid">
        </div>
    </main>

    <div class="modal" id="media-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="media-modal-title">新增媒體</h2>
                <button class="modal-close" id="media-modal-close">&times;</button>
            </div>
            <form id="media-form" class="character-form">
                <div class="form-group">
                    <label for="media-title">標題 *</label>
                    <input type="text" id="media-title" name="title" required>
                </div>
                
                <div class="form-group">
                    <label for="media-type">類型 *</label>
                    <select id="media-type" name="type" required>
                        <option value="">選擇類型</option>
                        <option value="image">圖片</option>
                        <option value="video">影片</option>
                    </select>
                </div>

                <div class="form-group" id="image-url-group">
                    <label for="media-url">圖片連結 *</label>
                    <input type="url" id="media-url" name="url" placeholder="https://...">
                    <p class="form-hint">支援 jpg、png、gif、webp 等圖片格式</p>
                </div>

                <div class="form-group" id="video-url-group" style="display:none">
                    <label for="media-video-url">影片連結 *</label>
                    <input type="url" id="media-video-url" name="videoUrl" placeholder="YouTube / Bilibili / mp4連結">
                    <p class="form-hint">支援 YouTube、Bilibili 連結或 mp4 直接連結</p>
                </div>

                <div class="form-group">
                    <label for="media-category">分類 *</label>
                    <select id="media-category" name="category" required>
                        <option value="">選擇分類</option>
                        <option value="official">官方活動</option>
                        <option value="festival">節日賀圖</option>
                        <option value="pv">宣傳PV</option>
                        <option value="wallpaper">桌布</option>
                        <option value="other">其他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="media-description">描述</label>
                    <textarea id="media-description" name="description" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label for="media-date">日期</label>
                    <input type="date" id="media-date" name="date">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="media-cancel">取消</button>
                    <button type="submit" class="btn btn-primary">儲存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="preview-modal">
        <div class="modal-content modal-preview">
            <button class="modal-close" id="preview-close">&times;</button>
            <div class="preview-container" id="preview-container">
            </div>
            <div class="preview-info">
                <h3 id="preview-title"></h3>
                <p id="preview-description"></p>
                <div class="preview-actions">
                    <button class="btn btn-secondary" id="preview-edit">編輯</button>
                    <button class="btn btn-danger" id="preview-delete">刪除</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>原神角色 Wiki &copy; 2026</p>
        <div class="footer-actions">
            <div id="user-info" class="user-info" style="display:none;"></div>
            <button id="login-btn" class="edit-toggle-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                登入編輯
            </button>
            <button id="logout-btn" class="edit-toggle-btn" style="display:none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                </svg>
                登出
            </button>
        </div>
    </footer>

    <div class="twofa-modal" id="twofa-modal">
        <div class="twofa-content">
            <h3>二階段驗證</h3>
            <p>請輸入 6 位數驗證碼</p>
            <div id="twofa-qrcode" class="twofa-qrcode"></div>
            <div id="twofa-secret-display" class="twofa-secret-display"></div>
            <input type="text" id="twofa-code" class="twofa-input" maxlength="6" placeholder="000000">
            <button id="twofa-submit" class="twofa-submit">驗證</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/music-player.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/character-data.js"></script>
    <script src="js/gallery.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Auth.init({
                clientId: '807013160344-7u52pcr2s2cplmck6jdq0nija2nu0dks.apps.googleusercontent.com',
                adminEmails: ['yaninlin@gmail.com'],
                twoFactorEnabled: true
            });
            MusicPlayer.init();
            
            document.getElementById('login-btn')?.addEventListener('click', () => Auth.login());
            document.getElementById('logout-btn')?.addEventListener('click', () => Auth.logout());
            document.getElementById('twofa-submit')?.addEventListener('click', () => {
                const code = document.getElementById('twofa-code').value;
                Auth.verify2FA(code);
            });
            
            document.getElementById('add-media-btn')?.addEventListener('click', (e) => {
                if (!Auth.isLoggedIn()) {
                    Auth.showToast('請先登入', 'error');
                    e.stopPropagation();
                }
            });
        });
    </script>
</body>
</html>
