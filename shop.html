<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品目錄 - 原神角色 Wiki</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/music-player.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <a href="index.html">
                    <h1>原神角色 Wiki</h1>
                </a>
            </div>
            <nav class="main-nav">
                <a href="/" class="nav-tab">角色列表</a>
                <a href="/gallery" class="nav-tab">活動圖片</a>
                <a href="/shop" class="nav-tab active">商品目錄</a>
            </nav>
        </div>
    </header>

    <main class="main-content shop-page">
        <div class="shop-header">
            <h2>商品目錄</h2>
            <button class="btn btn-primary" id="add-product-btn" style="display:none;">新增商品</button>
        </div>

        <div class="marquee-section" id="marquee-section">
            <div class="marquee-container">
                <div class="marquee-track" id="marquee-track">
                </div>
            </div>
        </div>

        <div class="shop-filters">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="figure">模型</button>
            <button class="filter-btn" data-category="merch">周邊</button>
            <button class="filter-btn" data-category="plush">玩偶</button>
            <button class="filter-btn" data-category="accessory">配件</button>
            <button class="filter-btn" data-category="other">其他</button>
        </div>

        <div class="shop-grid" id="shop-grid">
        </div>
    </main>

    <div class="modal" id="product-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="product-modal-title">新增商品</h2>
                <button class="modal-close" id="product-modal-close">&times;</button>
            </div>
            <form id="product-form" class="character-form">
                <div class="form-group">
                    <label for="product-name">商品名稱 *</label>
                    <input type="text" id="product-name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="product-price">價格</label>
                    <input type="text" id="product-price" name="price" placeholder="例如: ¥1200">
                </div>

                <div class="form-group">
                    <label for="product-category">分類 *</label>
                    <select id="product-category" name="category" required>
                        <option value="">選擇分類</option>
                        <option value="figure">模型</option>
                        <option value="merch">周邊</option>
                        <option value="plush">玩偶</option>
                        <option value="accessory">配件</option>
                        <option value="other">其他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="product-main-image">主圖連結 *</label>
                    <input type="url" id="product-main-image" name="mainImage" placeholder="https://..." required>
                    <p class="form-hint">商品主要展示圖片</p>
                </div>

                <div class="form-group">
                    <label for="product-images">相簿圖片連結</label>
                    <textarea id="product-images" name="images" rows="3" placeholder="每行一個連結，例如:&#10;https://...&#10;https://..."></textarea>
                    <p class="form-hint">可輸入多個圖片連結，每行一個</p>
                </div>

                <div class="form-group">
                    <label for="product-description">描述</label>
                    <textarea id="product-description" name="description" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label for="product-link">購買連結</label>
                    <input type="url" id="product-link" name="link" placeholder="https://...">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="product-cancel">取消</button>
                    <button type="submit" class="btn btn-primary">儲存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="preview-modal">
        <div class="modal-content modal-preview">
            <button class="modal-close" id="preview-close">&times;</button>
            <div class="preview-container" id="preview-container">
            </div>
            <div class="preview-info">
                <h3 id="preview-title"></h3>
                <p id="preview-price"></p>
                <p id="preview-description"></p>
                <div class="preview-gallery" id="preview-gallery"></div>
                <div class="preview-actions">
                    <a id="preview-link" class="btn btn-primary" target="_blank" rel="noopener" style="display:none;">購買連結</a>
                    <button class="btn btn-secondary" id="preview-edit">編輯</button>
                    <button class="btn btn-danger" id="preview-delete">刪除</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>原神角色 Wiki &copy; 2026</p>
        <div class="footer-actions">
            <div id="user-info" class="user-info" style="display:none;"></div>
            <button id="login-btn" class="edit-toggle-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                登入編輯
            </button>
            <button id="logout-btn" class="edit-toggle-btn" style="display:none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                </svg>
                登出
            </button>
        </div>
    </footer>

    <div class="twofa-modal" id="twofa-modal">
        <div class="twofa-content">
            <h3>二階段驗證</h3>
            <p>請輸入 6 位數驗證碼</p>
            <div id="twofa-qrcode" class="twofa-qrcode"></div>
            <div id="twofa-secret-display" class="twofa-secret-display"></div>
            <input type="text" id="twofa-code" class="twofa-input" maxlength="6" placeholder="000000">
            <button id="twofa-submit" class="twofa-submit">驗證</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/music-player.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/shop.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Auth.init({
                clientId: '807013160344-7u52pcr2s2cplmck6jdq0nija2nu0dks.apps.googleusercontent.com',
                adminEmails: ['yaninlin@gmail.com'],
                twoFactorEnabled: true
            });
            MusicPlayer.init();
            
            document.getElementById('login-btn')?.addEventListener('click', () => Auth.login());
            document.getElementById('logout-btn')?.addEventListener('click', () => Auth.logout());
            document.getElementById('twofa-submit')?.addEventListener('click', () => {
                const code = document.getElementById('twofa-code').value;
                Auth.verify2FA(code);
            });
        });
    </script>
</body>
</html>
